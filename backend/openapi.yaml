components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer token authentication

  parameters:
    UserId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: User ID

    CompanyId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Company ID

    CompanyIdQuery:
      name: companyId
      in: query
      schema:
        type: string
      description: Company ID filter

    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Resource ID

  schemas:
    # Common schemas
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
        error:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
        requestId:
          type: string

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            message:
              type: string

    Coordinates:
      type: object
      properties:
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double

    Location:
      type: object
      properties:
        address:
          type: string
        coordinates:
          $ref: '#/components/schemas/Coordinates'

    Address:
      type: object
      properties:
        street:
          type: string
        city:
          type: string
        state:
          type: string
        country:
          type: string
        zipCode:
          type: string

    DeliveryLocation:
      allOf:
        - $ref: '#/components/schemas/Address'
        - type: object
          properties:
            coordinates:
              $ref: '#/components/schemas/Coordinates'

    Document:
      type: object
      properties:
        type:
          type: string
        url:
          type: string
        uploadedAt:
          type: string
          format: date-time

    Attachment:
      type: object
      properties:
        type:
          type: string
        url:
          type: string
        uploadedAt:
          type: string
          format: date-time

    # Authentication schemas
    RegisterRequest:
      type: object
      required:
        - email
        - password
        - role
        - companyId
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        role:
          type: string
          enum: [Buyer, Supplier, Logistics, Clearance, Service Provider, Government, Admin]
        companyId:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    # RefreshTokenRequest removed - refresh token comes from httpOnly cookie, not request body

    ForgotPasswordRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          description: Email address of the account to reset password for

    ResetPasswordRequest:
      type: object
      required:
        - token
        - password
      properties:
        token:
          type: string
          description: Password reset token received via email
        password:
          type: string
          minLength: 8
          description: New password (minimum 8 characters)

    # AuthResponse kept for backward compatibility but not used
    # Use LoginResponse instead which doesn't include refreshToken in body
    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            user:
              type: object
              properties:
                id:
                  type: string
                email:
                  type: string
                role:
                  type: string
                companyId:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
            accessToken:
              type: string
            # refreshToken removed - now in httpOnly cookie only

    LoginResponse:
      type: object
      description: Response for login and register endpoints
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/User'
            accessToken:
              type: string
              description: JWT access token (15 minutes expiry)
          # refreshToken is NOT in response - set in httpOnly cookie
        requestId:
          type: string

    RefreshTokenResponse:
      type: object
      description: Response for refresh token endpoint
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/User'
            accessToken:
              type: string
              description: New JWT access token (15 minutes expiry)
          # refreshToken is NOT in response - new token set in httpOnly cookie
        requestId:
          type: string

