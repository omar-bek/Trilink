openapi: 3.0.3
info:
  title: TriLink Platform API
  description: |
    Comprehensive API documentation for the TriLink Platform - a multi-party procurement and logistics management system.
    
    ## Authentication
    Most endpoints require JWT Bearer token authentication. Include the token in the Authorization header:
    ```
    Authorization: Bearer <your-access-token>
    ```
    
    ## Roles & Permissions
    The platform supports the following roles:
    - **Buyer**: Creates purchase requests, evaluates bids, manages contracts
    - **Supplier**: Responds to RFQs, submits bids
    - **Logistics**: Manages shipments, updates GPS tracking
    - **Clearance**: Handles customs clearance
    - **Service Provider**: Provides various services
    - **Government**: View-only access with dispute resolution capabilities
    - **Admin**: Full system access
    
    ## Company Isolation
    Most resources are isolated by company. Users can only access resources belonging to their company unless they have Admin role.
  version: 1.0.0
  contact:
    name: TriLink Platform Support
    email: support@trilink.com
  license:
    name: Proprietary

servers:
  - url: http://localhost:3000/api
    description: Development server
  - url: https://api.trilink.com/api
    description: Production server

tags:
  - name: Authentication
    description: User authentication and token management
  - name: Users
    description: User management operations
  - name: Companies
    description: Company management and registration
  - name: Purchase Requests
    description: Purchase request creation and management
  - name: RFQs
    description: Request for Quotation management
  - name: Bids
    description: Bid submission and evaluation
  - name: Contracts
    description: Multi-party contract management
  - name: Shipments
    description: Shipment tracking and GPS updates
  - name: Payments
    description: Payment management and processing
  - name: Disputes
    description: Dispute creation and resolution
  - name: Analytics
    description: Analytics and reporting
  - name: Audit
    description: Audit log access

paths:
  /health:
    get:
      tags:
        - System
      summary: Health check endpoint
      description: Returns API health status
      responses:
        '200':
          description: API is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
                  environment:
                    type: string

  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: |
        Creates a new user account and returns access token and user data.
        Refresh token is set in httpOnly cookie (not in response body).
        Rate limited to prevent abuse.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              email: user@example.com
              password: SecurePass123!
              role: Buyer
              companyId: 507f1f77bcf86cd799439011
              firstName: John
              lastName: Doe
              phone: +971501234567
      responses:
        '201':
          description: User registered successfully
          headers:
            Set-Cookie:
              description: Refresh token set in httpOnly cookie
              schema:
                type: string
                example: refreshToken=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...; HttpOnly; Secure; SameSite=Strict; Path=/api/auth; Max-Age=604800
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login user
      description: |
        Authenticates user and returns access token and user data.
        Refresh token is set in httpOnly cookie (not in response body).
        Rate limited to prevent brute force attacks.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: user@example.com
              password: SecurePass123!
      responses:
        '200':
          description: Login successful
          headers:
            Set-Cookie:
              description: Refresh token set in httpOnly cookie
              schema:
                type: string
                example: refreshToken=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...; HttpOnly; Secure; SameSite=Strict; Path=/api/auth; Max-Age=604800
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      description: |
        Generates a new access token using a valid refresh token from httpOnly cookie.
        Implements token rotation for enhanced security.
        Refresh token is automatically sent via httpOnly cookie (not in request body).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          description: Token refreshed successfully
          headers:
            Set-Cookie:
              description: New refresh token set in httpOnly cookie
              schema:
                type: string
                example: refreshToken=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...; HttpOnly; Secure; SameSite=Strict; Path=/api/auth; Max-Age=604800
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/forgot-password:
    post:
      tags:
        - Authentication
      summary: Request password reset
      description: |
        Sends a password reset email with a secure token. The token expires in 1 hour.
        For security reasons, this endpoint always returns success even if the email doesn't exist,
        preventing email enumeration attacks.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
            example:
              email: user@example.com
      responses:
        '200':
          description: Password reset email sent (if account exists)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: If an account exists with this email, a password reset link has been sent.
                  requestId:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/reset-password:
    post:
      tags:
        - Authentication
      summary: Reset password
      description: |
        Resets user password using a valid reset token from the forgot-password email.
        The token must be valid and not expired (1 hour expiry).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
            example:
              token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
              password: NewSecurePass123!
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Password has been reset successfully.
                  requestId:
                    type: string
        '400':
          description: Invalid or expired token, or password validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '403':
          description: Account is not active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout user
      description: |
        Logs out the current user by clearing the refresh token httpOnly cookie.
        Access token should be discarded by the client.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          description: Logout successful
          headers:
            Set-Cookie:
              description: Refresh token cookie cleared
              schema:
                type: string
                example: refreshToken=; HttpOnly; Secure; SameSite=Strict; Path=/api/auth; Max-Age=0
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Logged out successfully.
                  requestId:
                    type: string

  /users:
    post:
      tags:
        - Users
      summary: Create a new user
      security:
        - bearerAuth: []
      description: Creates a new user. Requires MANAGE_USERS permission.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    get:
      tags:
        - Users
      summary: Get users by company
      security:
        - bearerAuth: []
      description: Retrieves all users for a specific company. Requires VIEW_USERS permission.
      parameters:
        - $ref: '#/components/parameters/CompanyIdQuery'
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserResponse'

  /users/me:
    patch:
      tags:
        - Users
      summary: Update my profile
      security:
        - bearerAuth: []
      description: |
        Allows authenticated users to update their own profile information.
        Users can only update firstName, lastName, and phone.
        No special permissions required - users can always update their own profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                  minLength: 1
                  maxLength: 100
                  description: User's first name
                lastName:
                  type: string
                  minLength: 1
                  maxLength: 100
                  description: User's last name
                phone:
                  type: string
                  pattern: '^[\+]?[(]?[0-9]{1,4}[)]?[-\s\.]?[(]?[0-9]{1,4}[)]?[-\s\.]?[0-9]{1,9}[-\s\.]?[0-9]{1,9}$'
                  description: Phone number in international format
              example:
                firstName: John
                lastName: Doe
                phone: +971 50 123 4567
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUser'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/{id}:
    get:
      tags:
        - Users
      summary: Get user by ID
      security:
        - bearerAuth: []
      description: Retrieves a specific user by ID. Requires VIEW_USERS permission.
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUser'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags:
        - Users
      summary: Update user
      security:
        - bearerAuth: []
      description: Updates user information. Requires MANAGE_USERS permission.
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUser'

    delete:
      tags:
        - Users
      summary: Delete user
      security:
        - bearerAuth: []
      description: Soft deletes a user. Requires MANAGE_USERS permission.
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /users/company/{companyId}:
    get:
      tags:
        - Users
      summary: Get users by company ID
      security:
        - bearerAuth: []
      description: Retrieves all users belonging to a specific company. Requires VIEW_USERS permission.
      parameters:
        - $ref: '#/components/parameters/CompanyId'
        - name: role
          in: query
          schema:
            type: string
          description: Filter by role
        - name: status
          in: query
          schema:
            type: string
          description: Filter by status
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserResponse'

  /companies:
    post:
      tags:
        - Companies
      summary: Create a new company
      security:
        - bearerAuth: []
      description: Creates a new company. Requires MANAGE_COMPANIES permission.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCompanyRequest'
      responses:
        '201':
          description: Company created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseCompany'

    get:
      tags:
        - Companies
      summary: Get all companies
      security:
        - bearerAuth: []
      description: Retrieves all companies. Requires VIEW_COMPANIES permission.
      responses:
        '200':
          description: List of companies
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CompanyResponse'

  /companies/{id}:
    get:
      tags:
        - Companies
      summary: Get company by ID
      security:
        - bearerAuth: []
      description: Retrieves a specific company by ID. Requires VIEW_COMPANIES permission.
      parameters:
        - $ref: '#/components/parameters/CompanyId'
      responses:
        '200':
          description: Company details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseCompany'

    patch:
      tags:
        - Companies
      summary: Update company
      security:
        - bearerAuth: []
      description: Updates company information. Requires MANAGE_COMPANIES permission.
      parameters:
        - $ref: '#/components/parameters/CompanyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCompanyRequest'
      responses:
        '200':
          description: Company updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseCompany'

    delete:
      tags:
        - Companies
      summary: Delete company
      security:
        - bearerAuth: []
      description: Deletes a company. Requires MANAGE_COMPANIES permission.
      parameters:
        - $ref: '#/components/parameters/CompanyId'
      responses:
        '200':
          description: Company deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /companies/{id}/documents:
    post:
      tags:
        - Companies
      summary: Add document to company
      security:
        - bearerAuth: []
      description: Adds a document to a company. Requires MANAGE_COMPANIES permission.
      parameters:
        - $ref: '#/components/parameters/CompanyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                url:
                  type: string
      responses:
        '200':
          description: Document added successfully

  /companies/{id}/approve:
    post:
      tags:
        - Companies
      summary: Approve company
      security:
        - bearerAuth: []
      description: Approves a company registration. Admin only.
      parameters:
        - $ref: '#/components/parameters/CompanyId'
      responses:
        '200':
          description: Company approved successfully

  /companies/{id}/reject:
    post:
      tags:
        - Companies
      summary: Reject company
      security:
        - bearerAuth: []
      description: Rejects a company registration. Admin only.
      parameters:
        - $ref: '#/components/parameters/CompanyId'
      responses:
        '200':
          description: Company rejected successfully

  /purchase-requests:
    post:
      tags:
        - Purchase Requests
      summary: Create purchase request
      security:
        - bearerAuth: []
      description: Creates a new purchase request. Buyer role only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePurchaseRequestRequest'
      responses:
        '201':
          description: Purchase request created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePurchaseRequest'

    get:
      tags:
        - Purchase Requests
      summary: Get purchase requests
      security:
        - bearerAuth: []
      description: Retrieves purchase requests for the authenticated user's company. Buyer role only.
      responses:
        '200':
          description: List of purchase requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PurchaseRequestResponse'

  /purchase-requests/{id}:
    get:
      tags:
        - Purchase Requests
      summary: Get purchase request by ID
      security:
        - bearerAuth: []
      description: Retrieves a specific purchase request. Buyer role only.
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Purchase request details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePurchaseRequest'

    patch:
      tags:
        - Purchase Requests
      summary: Update purchase request
      security:
        - bearerAuth: []
      description: Updates a purchase request. Buyer role only.
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePurchaseRequestRequest'
      responses:
        '200':
          description: Purchase request updated successfully

    delete:
      tags:
        - Purchase Requests
      summary: Delete purchase request
      security:
        - bearerAuth: []
      description: Deletes a purchase request. Buyer role only.
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Purchase request deleted successfully

  /purchase-requests/{id}/submit:
    post:
      tags:
        - Purchase Requests
      summary: Submit purchase request
      security:
        - bearerAuth: []
      description: Submits a purchase request for processing. Buyer role only.
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Purchase request submitted successfully

  /purchase-requests/{id}/approve:
    post:
      tags:
        - Purchase Requests
      summary: Approve purchase request
      security:
        - bearerAuth: []
      description: Approves a purchase request
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Purchase request approved successfully

  /rfqs:
    post:
      tags:
        - RFQs
      summary: Create RFQ
      security:
        - bearerAuth: []
      description: Creates a new Request for Quotation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRFQRequest'
      responses:
        '201':
          description: RFQ created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseRFQ'

    get:
      tags:
        - RFQs
      summary: Get RFQs
      security:
        - bearerAuth: []
      description: Retrieves RFQs filtered by company
      responses:
        '200':
          description: List of RFQs
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RFQResponse'

  /rfqs/available:
    get:
      tags:
        - RFQs
      summary: Get available RFQs
      security:
        - bearerAuth: []
      description: Retrieves RFQs available for the authenticated user's role
      responses:
        '200':
          description: List of available RFQs
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RFQResponse'

  /rfqs/purchase-request/{purchaseRequestId}:
    get:
      tags:
        - RFQs
      summary: Get RFQs by purchase request
      security:
        - bearerAuth: []
      description: Retrieves all RFQs for a specific purchase request
      parameters:
        - name: purchaseRequestId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of RFQs
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RFQResponse'

  /rfqs/{id}:
    get:
      tags:
        - RFQs
      summary: Get RFQ by ID
      security:
        - bearerAuth: []
      description: Retrieves a specific RFQ
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: RFQ details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseRFQ'

    patch:
      tags:
        - RFQs
      summary: Update RFQ
      security:
        - bearerAuth: []
      description: Updates an RFQ
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRFQRequest'
      responses:
        '200':
          description: RFQ updated successfully

    delete:
      tags:
        - RFQs
      summary: Delete RFQ
      security:
        - bearerAuth: []
      description: Deletes an RFQ
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: RFQ deleted successfully

  /bids:
    post:
      tags:
        - Bids
      summary: Create bid
      security:
        - bearerAuth: []
      description: Creates a new bid for an RFQ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBidRequest'
      responses:
        '201':
          description: Bid created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBid'

    get:
      tags:
        - Bids
      summary: Get bids
      security:
        - bearerAuth: []
      description: Retrieves bids filtered by company
      responses:
        '200':
          description: List of bids
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BidResponse'

  /bids/rfq/{rfqId}:
    get:
      tags:
        - Bids
      summary: Get bids by RFQ
      security:
        - bearerAuth: []
      description: Retrieves all bids for a specific RFQ
      parameters:
        - name: rfqId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of bids
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BidResponse'

  /bids/{id}:
    get:
      tags:
        - Bids
      summary: Get bid by ID
      security:
        - bearerAuth: []
      description: Retrieves a specific bid
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Bid details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBid'

    patch:
      tags:
        - Bids
      summary: Update bid
      security:
        - bearerAuth: []
      description: Updates a bid
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
